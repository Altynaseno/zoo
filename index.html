<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zoo Advanced App - Assignment 6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">Zoo Discovery</a>
        <div class="navbar-nav">
            <a class="nav-link active" href="index.html">Home</a>
            <a class="nav-link" href="profiles.html">Animals</a>
            <a class="nav-link" href="responsive.html">Features</a>
        </div>
    </div>
</nav>

<main class="container mt-5">
    <section class="mb-5">
        <h2>Our Animals</h2>
        <input type="text" id="animal-search" class="form-control mb-4" placeholder="Search animals...">
        <div id="animal-list" class="row">
            </div>
    </section>

    <section class="bg-white p-4 rounded shadow-sm">
        <h2>Contact Our Team</h2>
        <form id="contact-form" novalidate>
            <div class="mb-3">
                <label class="form-label">Email</label>
                <input type="email" id="email-input" class="form-control" required>
                <div id="email-feedback" class="text-danger small"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Message Type</label>
                <select id="msg-type" class="form-select">
                    <option value="general">General Inquiry</option>
                    <option value="emergency">Emergency</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary">Send Message</button>
        </form>
    </section>
</main>

<footer class="bg-dark text-white text-center py-4 mt-5">
    <div class="container">
        <p>Developed by: <strong>Altynay Nassenova & Bekzhigitova Tamiris</strong></p>
    </div>
</footer>

<script src="js/app.js"></script>
</body>
</html>
