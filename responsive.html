<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Design - Self Study</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Animal Care</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="profiles.html">Pets</a></li>
                    <li class="nav-item"><a class="nav-link active" href="responsive.html">Tips</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-4">Responsive Grid Demo</h2>
        
        <div id="petCarousel" class="carousel slide shadow rounded overflow-hidden mb-5" data-bs-ride="carousel">
            <div class="carousel-inner">
                <div class="carousel-item active">
                    <div class="bg-primary text-white text-center py-5">
                        <h3>Tip #1: Hydration</h3>
                        <p>Always provide fresh water for your pets.</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <div class="bg-success text-white text-center py-5">
                        <h3>Tip #2: Exercise</h3>
                        <p>Daily walks keep your dog healthy and happy.</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#petCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon"></span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#petCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon"></span>
            </button>
        </div>

        <div class="row text-center">
            <div class="col-md-4 mb-3"><div class="p-4 bg-white border">Tablet/Desktop View</div></div>
            <div class="col-md-4 mb-3"><div class="p-4 bg-white border">Fully Responsive</div></div>
            <div class="col-md-4 mb-3"><div class="p-4 bg-white border">Bootstrap Grid</div></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
