<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Profiles - Cards</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">Animal Care</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link active" href="profiles.html">Pets</a></li>
                    <li class="nav-item"><a class="nav-link" href="responsive.html">Tips</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <h2 class="text-center mb-5 display-5">Our Beloved Pets</h2>
        <div class="row g-4">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 shadow-sm custom-card">
                    <img src="dog.jpg" class="card-img-top" alt="Buddy">
                    <div class="card-body text-center">
                        <h5 class="card-title">Buddy</h5>
                        <p class="card-text text-muted">A loyal friend.</p>
                        <a href="#" class="btn btn-outline-primary btn-sm">View Profile</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 shadow-sm custom-card">
                    <img src="cat.jpg" class="card-img-top" alt="Whiskers">
                    <div class="card-body text-center">
                        <h5 class="card-title">Whiskers</h5>
                        <p class="card-text text-muted">A calm and fluffy kitten.</p>
                        <a href="#" class="btn btn-outline-primary btn-sm">View Profile</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 shadow-sm custom-card">
                    <img src="parrot.jpg" class="card-img-top" alt="Rio">
                    <div class="card-body text-center">
                        <h5 class="card-title">Rio</h5>
                        <p class="card-text text-muted">A colorful tropical bird.</p>
                        <a href="#" class="btn btn-outline-primary btn-sm">View Profile</a>
                    </div>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card h-100 shadow-sm custom-card">
                    <img src="rabbit.jpg" class="card-img-top" alt="Hops">
                    <div class="card-body text-center">
                        <h5 class="card-title">Hops</h5>
                        <p class="card-text text-muted">Small, fast, and very cute.</p>
                        <a href="#" class="btn btn-outline-primary btn-sm">View Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
